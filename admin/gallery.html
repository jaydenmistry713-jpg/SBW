<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Manager | SBW Events CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-page">

  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar__logo">
        <span class="logo-text">SBW <span class="logo-accent">Events</span></span>
      </div>
      <ul class="admin-nav">
        <li>
          <a href="/admin/gallery.html" class="is-active">
            <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
            Gallery
          </a>
        </li>
        <li>
          <a href="/admin/menus.html">
            <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            Menus
          </a>
        </li>
        <li>
          <a href="/admin/texts.html">
            <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
            Texts
          </a>
        </li>
        <li>
          <a href="/" style="margin-top:auto">
            <svg class="admin-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            View Site
          </a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <div class="admin-main">
      <div class="admin-topbar">
        <h1>Gallery Manager</h1>
        <div class="admin-topbar__user">
          <span id="user-email"></span>
          <button class="admin-topbar__signout" id="signout-btn">Sign Out</button>
        </div>
      </div>

      <div class="admin-content">
        <!-- Alert -->
        <div class="admin-alert" id="admin-alert"></div>

        <!-- Upload Zone -->
        <div class="upload-zone" id="upload-zone">
          <div class="upload-zone__icon">📷</div>
          <h3>Upload Images</h3>
          <p>Drag and drop images here, or click to select files</p>
          <label class="btn btn--green" for="file-input" style="cursor:pointer">Choose Files</label>
          <input type="file" id="file-input" accept="image/*" multiple>
        </div>

        <!-- Gallery Grid -->
        <div id="admin-gallery-grid" class="admin-gallery-grid">
          <p style="color:var(--color-mid);grid-column:1/-1;text-align:center;padding:3rem 0;">Loading gallery...</p>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
